<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF5C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background square -->
  <rect x="2" y="2" width="76" height="76" rx="20" fill="#1A1611"/>
  <rect x="2" y="2" width="76" height="76" rx="20" stroke="url(#markGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- M letterform -->
  <path d="M18 58 L18 26 L40 50 L62 26 L62 58"
    stroke="url(#markGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- AI spark dots (top-right corner) -->
  <circle cx="62" cy="14" r="4" fill="#C4973B" opacity="0.9"/>
  <circle cx="70" cy="10" r="2.5" fill="#C4973B" opacity="0.55"/>
  <circle cx="67" cy="20" r="2" fill="#C4973B" opacity="0.4"/>
</svg>
