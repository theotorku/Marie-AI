<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4973B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="mg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF5C"/>
      <stop offset="100%" stop-color="#C4973B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="78" height="78" rx="18" fill="#1A1611"/>
  <rect x="1" y="1" width="78" height="78" rx="18" stroke="url(#mg)" stroke-width="1.5" opacity="0.5"/>

  <!-- M letterform -->
  <polyline points="16,60 16,22 40,48 64,22 64,60"
    fill="none"
    stroke="url(#mg2)"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Spark dots -->
  <circle cx="64" cy="13" r="4"   fill="#C4973B" opacity="0.85"/>
  <circle cx="72" cy="8"  r="2.5" fill="#C4973B" opacity="0.5"/>
  <circle cx="70" cy="21" r="1.8" fill="#C4973B" opacity="0.38"/>
</svg>
