<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF5C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4973B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo mark: rounded square with M + AI spark -->
  <rect x="0" y="8" width="64" height="64" rx="16" fill="url(#markGrad)"/>

  <!-- Inner M letterform -->
  <path d="M16 52 L16 28 L32 46 L48 28 L48 52" stroke="#1A1611" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Spark / AI dot cluster top-right of mark -->
  <circle cx="51" cy="17" r="3.5" fill="#1A1611" opacity="0.7"/>
  <circle cx="58" cy="13" r="2" fill="#1A1611" opacity="0.5"/>
  <circle cx="55" cy="22" r="1.5" fill="#1A1611" opacity="0.4"/>

  <!-- Wordmark: Marie -->
  <text
    x="80"
    y="52"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="600"
    font-size="34"
    fill="url(#goldGrad)"
    filter="url(#glow)"
    letter-spacing="0.5"
  >Marie</text>

  <!-- Wordmark: AI — lighter weight, slightly offset -->
  <text
    x="213"
    y="52"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="400"
    font-style="italic"
    font-size="34"
    fill="#E8E0D4"
    opacity="0.75"
    letter-spacing="1"
  >AI</text>

  <!-- Thin gold rule under wordmark -->
  <line x1="80" y1="59" x2="248" y2="59" stroke="url(#goldGrad)" stroke-width="0.75" opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="80"
    y="73"
    font-family="'DM Sans', 'Helvetica Neue', sans-serif"
    font-weight="400"
    font-size="9.5"
    fill="#E8E0D4"
    opacity="0.45"
    letter-spacing="3"
  >BEAUTY · INTELLIGENCE</text>
</svg>
