<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF5C"/>
      <stop offset="100%" stop-color="#C4973B"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4973B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- Mark background -->
  <rect x="0" y="4" width="64" height="64" rx="14" fill="url(#g2)"/>

  <!-- M letterform inside mark -->
  <polyline points="14,52 14,24 32,44 50,24 50,52"
    fill="none"
    stroke="#1A1611"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- AI spark dots (top-right of mark) -->
  <circle cx="52" cy="14" r="3.5" fill="#1A1611" opacity="0.55"/>
  <circle cx="59" cy="9"  r="2.2" fill="#1A1611" opacity="0.35"/>
  <circle cx="57" cy="20" r="1.6" fill="#1A1611" opacity="0.28"/>

  <!-- Wordmark — "Marie" using Georgia/serif fallback, always available -->
  <text x="80" y="49"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="bold"
    font-size="33"
    letter-spacing="0.5"
    fill="url(#g1)"
  >Marie</text>

  <!-- "AI" — lighter style -->
  <text x="210" y="49"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="normal"
    font-style="italic"
    font-size="33"
    letter-spacing="1"
    fill="#E8E0D4"
    opacity="0.7"
  >AI</text>

  <!-- Thin rule -->
  <line x1="80" y1="56" x2="252" y2="56" stroke="url(#g1)" stroke-width="0.8" opacity="0.45"/>

  <!-- Tagline -->
  <text x="80" y="68"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="8.5"
    letter-spacing="3.5"
    fill="#E8E0D4"
    opacity="0.4"
  >BEAUTY · INTELLIGENCE</text>
</svg>
